<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belgium Route Planner</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet for maps (free, no API key needed) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <header>
    <h1>🚛 Belgium Route Planner</h1>
    <nav>
      <button onclick="showTab('routes')" class="tab-btn active" id="tab-routes">
        📋 All Routes
      </button>
      <button onclick="showTab('planner')" class="tab-btn" id="tab-planner">
        📦 New Delivery
      </button>
    </nav>
  </header>

  <!-- TAB 1: All Routes View -->
  <section id="routes-section" class="tab-content active">
    <div id="map" style="height: 500px; margin-bottom: 20px;"></div>
    
    <div class="filters">
      <input type="text" id="search-routes" placeholder="Search routes..." 
             oninput="filterRoutes()">
      <select id="filter-type" onchange="filterRoutes()">
        <option value="">All Trip Types</option>
        <option value="INTER ISC/BPI">INTER ISC/BPI</option>
        <option value="DISTRIBUTION">DISTRIBUTION</option>
        <option value="MILKROUND">MILKROUND</option>
        <option value="HOME PICKUP">HOME PICKUP</option>
      </select>
      <select id="filter-day" onchange="filterRoutes()">
        <option value="">All Days</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
        <option value="0">Sunday</option>
      </select>
      <select id="filter-from" onchange="filterRoutes()">
        <option value="">All Departing Hubs</option>
      </select>
      <select id="filter-to" onchange="filterRoutes()">
        <option value="">All Arriving Hubs</option>
      </select>
      <select id="filter-trc" onchange="filterRoutes()">
        <option value="">All TRCs</option>
      </select>
      <select id="filter-p70p90" onchange="filterRoutes()">
        <option value="">P70 &amp; P90</option>
        <option value="P70">P70 only</option>
        <option value="P90">P90 only</option>
      </select>
      <input type="number" id="filter-capacity" placeholder="Min capacity" min="0"
             oninput="filterRoutes()" style="min-width:140px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <label style="font-size:13px;white-space:nowrap;">Depart between</label>
        <input type="time" id="filter-time-from" value="00:00" onchange="filterRoutes()" style="min-width:120px;">
        <label style="font-size:13px;">–</label>
        <input type="time" id="filter-time-to" value="23:59" onchange="filterRoutes()" style="min-width:120px;">
      </div>
    </div>
    
    <div id="routes-table-container"></div>
  </section>

  <!-- TAB 2: New Delivery Planner -->
  <section id="planner-section" class="tab-content">
    <div class="planner-form">
      <h2>📦 Plan a New Delivery</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label>Pickup Location</label>
          <input type="text" id="pickup-name" placeholder="e.g., Namur, Leuven...">
          <small>Type a Belgian city — we'll find coordinates</small>
        </div>
        <div class="form-group">
          <label>Delivery Location</label>
          <input type="text" id="delivery-name" placeholder="e.g., Wavre, Mons...">
          <small>Can be a new location not in existing routes</small>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Containers Needed</label>
          <input type="number" id="containers" value="10" min="1" max="100">
        </div>
        <div class="form-group">
          <label>Day of Week</label>
          <select id="delivery-day">
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
            <option value="0">Sunday</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Earliest Delivery Time</label>
          <input type="time" id="earliest-time" value="06:00">
        </div>
        <div class="form-group">
          <label>Latest Delivery Time</label>
          <input type="time" id="latest-time" value="14:00">
        </div>
      </div>

      <button onclick="searchRoutes()" class="search-btn">
        🔍 Find Best Routes
      </button>
    </div>

    <div id="results-container"></div>
  </section>

  <script src="routes-data.js"></script>
  <script src="app.js"></script>
  <script>
    // ============================================
    // PAGE INITIALIZATION
    // ============================================
    
    // Tab switching
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-section').classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // Initialize map
    let map = null, routeLines = [];
    try {
      map = L.map('map').setView([50.8, 4.4], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      // Add route lines to map — keep a reference per route index for filtering
      routeLines = ROUTES_DATA.map(route => {
        const from = LOCATIONS[route.from];
        const to = LOCATIONS[route.to];
        if (from && to) {
          const line = L.polyline(
            [[from.lat, from.lng], [to.lat, to.lng]],
            { color: '#3388ff', weight: 1, opacity: 0.4 }
          ).addTo(map);
        line.bindPopup(`<b>${route.service}</b><br>${route.from} → ${route.to}<br>
                        Dep: ${route.departure} | Arr: ${route.arrival}`);
        return line;
      }
      return null;
    });

    // Add location markers
    Object.entries(LOCATIONS).forEach(([name, coords]) => {
      L.circleMarker([coords.lat, coords.lng], {
        radius: 5, fillColor: '#e74c3c', color: '#fff', 
        weight: 1, fillOpacity: 0.8
      }).addTo(map).bindPopup(`<b>${name}</b><br>${coords.city}`);
    });

    // Helper: convert "HH:MM" to minutes
    function hmToMinutes(hm) {
      if (!hm) return null;
      const [h, m] = hm.split(':').map(Number);
      return h * 60 + m;
    }

    // Render routes table and update map
    function filterRoutes() {
      const search    = document.getElementById('search-routes').value.toLowerCase();
      const typeFilter    = document.getElementById('filter-type').value;
      const dayFilter     = document.getElementById('filter-day').value;
      const fromFilter    = document.getElementById('filter-from').value;
      const toFilter      = document.getElementById('filter-to').value;
      const trcFilter     = document.getElementById('filter-trc').value;
      const p70p90Filter  = document.getElementById('filter-p70p90').value;
      const capFilter     = parseInt(document.getElementById('filter-capacity').value) || 0;
      const timeFromMins  = hmToMinutes(document.getElementById('filter-time-from').value) ?? 0;
      const timeToMins    = hmToMinutes(document.getElementById('filter-time-to').value) ?? 1439;

      const filteredIndices = [];
      ROUTES_DATA.forEach((r, i) => {
        const matchSearch = !search || 
          r.from.toLowerCase().includes(search) || 
          r.to.toLowerCase().includes(search) ||
          r.service.toLowerCase().includes(search);
        const matchType  = !typeFilter  || r.tripType === typeFilter;
        const matchDay   = !dayFilter   || r.ospFrequency.includes(dayFilter);
        const matchFrom  = !fromFilter  || r.from === fromFilter;
        const matchTo    = !toFilter    || r.to === toFilter;
        const matchTrc   = !trcFilter   || r.trc === trcFilter;
        const matchP     = !p70p90Filter || r.p70p90 === p70p90Filter;
        const matchCap   = !capFilter   || (r.capacity !== null && r.capacity >= capFilter);
        const dep = r._depMinutes;
        const matchTime  = dep === null || (dep >= timeFromMins && dep <= timeToMins);

        if (matchSearch && matchType && matchDay && matchFrom && matchTo &&
            matchTrc && matchP && matchCap && matchTime) {
          filteredIndices.push(i);
        }
      });

      // Update map lines visibility
      routeLines.forEach((line, i) => {
        if (!line) return;
        if (filteredIndices.includes(i)) {
          if (!map.hasLayer(line)) line.addTo(map);
        } else {
          if (map.hasLayer(line)) map.removeLayer(line);
        }
      });

      const filtered = filteredIndices.map(i => ROUTES_DATA[i]);
      const container = document.getElementById('routes-table-container');
      let html = `<p><strong>Showing ${filtered.length} of ${ROUTES_DATA.length} routes</strong></p>`;
      html += '<table class="routes-table"><tr>';
      html += '<th>Service</th><th>From</th><th>To</th><th>TRC</th><th>Dep</th>';
      html += '<th>Arr</th><th>Dist</th><th>Dur</th><th>Cap</th>';
      html += '<th>Type</th><th>Days</th><th>P70/P90</th></tr>';

      filtered.slice(0, 200).forEach(r => {
        const depMins = r._depMinutes;
        const depStr  = depMins !== null ? formatMinutes(depMins) : r.departure;
        const arrMins = r._arrMinutes;
        const arrStr  = arrMins !== null ? formatMinutes(arrMins) : r.arrival;
        html += `<tr>
          <td>${r.service}</td><td>${r.from}</td><td>${r.to}</td><td>${r.trc || ''}</td>
          <td>${depStr}</td><td>${arrStr}</td>
          <td>${r.plannedDistance != null ? r.plannedDistance + 'km' : ''}</td>
          <td>${r.plannedDuration != null ? r.plannedDuration + 'min' : ''}</td>
          <td>${r.capacity != null ? r.capacity : ''}</td>
          <td>${r.tripType}</td><td>${r.ospFrequency}</td><td>${r.p70p90 || ''}</td>
        </tr>`;
      });
      html += '</table>';
      if (filtered.length > 200) html += '<p><em>Showing first 200 of ' + filtered.length + '...</em></p>';
      container.innerHTML = html;
    }
    filterRoutes(); // Initial render

    // ============================================
    // GEOCODING (convert city name to coordinates)
    // ============================================
    async function geocode(cityName) {
      // First check our known locations
      for (const [name, coords] of Object.entries(LOCATIONS)) {
        if (name.toLowerCase().includes(cityName.toLowerCase()) ||
            coords.city.toLowerCase().includes(cityName.toLowerCase())) {
          return { lat: coords.lat, lng: coords.lng, name: name };
        }
      }
      // If not found, use free Nominatim geocoder with timeout and User-Agent
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName + ', Belgium')}&format=json&limit=1`,
          {
            signal: controller.signal,
            headers: { 'User-Agent': 'BelgiumRoutePlanner/1.0' }
          }
        );
        const data = await response.json();
        if (data.length > 0) {
          return { 
            lat: parseFloat(data[0].lat), 
            lng: parseFloat(data[0].lon), 
            name: data[0].display_name 
          };
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          console.warn('Geocoding timed out for:', cityName);
        } else {
          console.error('Geocoding error:', err);
        }
      } finally {
        clearTimeout(timer);
      }
      return null;
    }

    // ============================================
    // SEARCH BUTTON HANDLER
    // ============================================
    async function searchRoutes() {
      const resultsDiv = document.getElementById('results-container');
      resultsDiv.innerHTML = `
        <div style="text-align:center;padding:30px;">
          <div class="spinner"></div>
          <p id="search-status" style="margin-top:15px;font-size:16px;">🔄 Geocoding locations...</p>
        </div>`;

      let pickup, delivery;
      try {
        pickup   = await geocode(document.getElementById('pickup-name').value);
        delivery = await geocode(document.getElementById('delivery-name').value);
      } catch (err) {
        resultsDiv.innerHTML = `<p>❌ Geocoding failed: ${err.message}</p>`;
        return;
      }

      if (!pickup)   { resultsDiv.innerHTML = '<p>❌ Could not find pickup location. Try a Belgian city name.</p>'; return; }
      if (!delivery) { resultsDiv.innerHTML = '<p>❌ Could not find delivery location. Try a Belgian city name.</p>'; return; }

      document.getElementById('search-status').textContent = '🔄 Searching routes...';

      const request = {
        pickupLocation: pickup,
        deliveryLocation: delivery,
        containersNeeded: parseInt(document.getElementById('containers').value),
        earliestTime: document.getElementById('earliest-time').value,
        latestTime: document.getElementById('latest-time').value,
        dayOfWeek: parseInt(document.getElementById('delivery-day').value)
      };

      // Use setTimeout so the "Searching..." UI renders before heavy computation
      setTimeout(() => {
        const results = findDeliveryOptions(request);
        renderResults(results, resultsDiv);
      }, 50);
    }
  </script>

</body>
</html>
